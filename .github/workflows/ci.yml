name: CI

on:
  push:
    branches: [master]
  pull_request:

# A newer push to the same ref supersedes in-flight runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # rustup installs the pinned toolchain + rustfmt from rust-toolchain.toml,
      # so CI formats with the same nightly the build uses.
      - name: Install pinned toolchain
        run: rustup show
      - run: cargo fmt --all --check

  check:
    name: build · clippy · test
    runs-on: ubuntu-latest
    # The Cargo workspace is at the repo root.
    steps:
      - uses: actions/checkout@v6
      # rustup auto-installs the pinned toolchain + components from
      # rust-toolchain.toml (single source of truth for the nightly).
      - name: Install pinned toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
      - run: cargo build --workspace --all-targets --locked
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - run: cargo test --workspace --locked

  miri:
    name: Miri (UB check · pure crates)
    runs-on: ubuntu-latest
    # Miri interprets the MIR to catch undefined behaviour in the byte-level / unsafe-adjacent
    # logic we own. Scoped to the crates whose tests are Miri-clean: glass-clip-hook (the private-
    # clipboard wire protocol + store) and glass-windows (pure pixel/dpi/jobpids byte parsing).
    # Miri cannot execute FFI / foreign functions, so the Win32 named-pipe server and the injected
    # user32 detours (cfg(windows)) are out of Miri's reach — those are covered on-box + by review.
    # The `miri` component is added here (not pinned in rust-toolchain.toml) so a future nightly
    # bump that lacks it fails only this job, not every job's `rustup show`.
    steps:
      - uses: actions/checkout@v6
      - name: Install pinned toolchain
        run: rustup show
      - name: Add miri component
        run: rustup component add miri
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
      - run: cargo miri test -p glass-clip-hook -p glass-windows --locked

  x11:
    name: X11 integration (Xvfb)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install pinned toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
      - name: Install system deps
        # bubblewrap: sandbox_* integration tests need unprivileged user namespaces.
        # Ubuntu 24.04 runners restrict them via AppArmor (bwrap then fails "setting up
        # uid map: Permission denied"), so re-enable them (no-op on images without the knob).
        run: |
          sudo apt-get update && sudo apt-get install -y xvfb bubblewrap
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true
      - run: ./scripts/test-x11.sh

  wayland:
    name: Wayland integration (sway)
    runs-on: ubuntu-latest
    # Runs the #[ignore]d Wayland suite (scripts/test-wayland.sh) against a prebuilt
    # portable sway >=1.12 bundle from the sway-build repo's bundle-latest release
    # (cage was retired; Ubuntu only ships sway 1.9). The bundle is extracted into the
    # glass discovery location so test-wayland.sh finds it with zero config.
    steps:
      - uses: actions/checkout@v6
      - name: Install pinned toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
      - name: Install system deps
        # The sway bundle resolves the Mesa/GL/EGL/gbm/drm stack from the host, so install
        # the GLVND loaders + Mesa software EGL/DRI (not just libgl1-mesa-dri). Plus Xwayland
        # for the app, and bubblewrap for sandbox_* — whose unprivileged user namespaces
        # Ubuntu 24.04 restricts via AppArmor, so re-enable them (no-op if the knob is absent).
        run: |
          sudo apt-get update && sudo apt-get install -y \
            xwayland libegl1 libgl1 libgles2 libgbm1 libdrm2 libegl-mesa0 libgl1-mesa-dri bubblewrap
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true
      - name: Fetch prebuilt sway bundle
        run: |
          mkdir -p ~/.local/share/glass/sway
          curl -fsSL https://github.com/xxx/sway-build/releases/download/bundle-latest/sway-bundle-linux-x86_64.tar.gz \
            | tar -C ~/.local/share/glass/sway -xz
          ~/.local/share/glass/sway/bin/sway --version
      - run: ./scripts/test-wayland.sh

  macos:
    name: macOS (build · clippy · test)
    runs-on: macos-14   # arm64 hosted runner
    # Only the glass-macos crate is Mac-specific; the rest of the workspace already
    # builds/tests on the Linux `check` job. This is the only place the
    # cfg(target_os = "macos") code gets built + linted + tested — the Linux job can't
    # compile it. Capture/input integration tests are #[ignore]d (need a granted,
    # WindowServer-connected TCC context) and run on-box; the runner covers pure +
    # macOS unit tests.
    steps:
      - uses: actions/checkout@v6
      # rustup auto-installs the pinned toolchain + components from
      # rust-toolchain.toml (single source of truth for the nightly).
      - name: Install pinned toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
      - run: cargo build  -p glass-macos --locked
      - run: cargo clippy -p glass-macos --all-targets --locked -- -D warnings
      - run: ./scripts/test-macos.sh
      # glass-a11y-macos is the standalone AXUIElement accessibility reader glass-mcp wires
      # into the macOS backend (make_platform, doctor's "accessibility (macos)" section).
      # Its pure `mapping` module has no cfg(macos) gate and already builds + unit-tests on
      # the Linux `check` job's `cargo build/test --workspace` legs; this is the only job
      # that can build/lint/test the cfg(target_os = "macos") `ffi`/`reader` modules
      # underneath it (the AXUIElement snapshot/set_value implementation, incl. `reader`'s
      # `set_value_took` unit tests, which are compiled out everywhere else).
      - run: cargo build  -p glass-a11y-macos --locked
      - run: cargo clippy -p glass-a11y-macos --all-targets --locked -- -D warnings
      - run: cargo test   -p glass-a11y-macos --locked
      # glass-sandbox-macos is the Seatbelt (sandbox_init) process-containment crate. Its
      # pure `build_profile` SBPL generator has no cfg(macos) gate and already builds +
      # unit-tests on the Linux `check` job's `cargo build/test --workspace` legs; this is
      # the only job that can build/lint/test the cfg(target_os = "macos") `ffi`/`doctor`
      # modules underneath it. The `glass-macos` `--lib` containment test that actually
      # spawns a contained process runs via `./scripts/test-macos.sh` above.
      - run: cargo build  -p glass-sandbox-macos --locked
      - run: cargo clippy -p glass-sandbox-macos --all-targets --locked -- -D warnings
      - run: cargo test   -p glass-sandbox-macos --locked
      # glass-clip-shim-macos is the DYLD_INSERT_LIBRARIES cdylib that swizzles
      # +[NSPasteboard generalPasteboard] inside a contained app process. It's cdylib-only
      # (crate-type = ["cdylib"], no rlib), so there's nothing for `cargo test` to run here —
      # the pure routing logic it's driven by lives in glass-macos::clipboard_route, which
      # has no cfg(macos) gate and already unit-tests on the Linux `check` job's `cargo test
      # --workspace` leg. This is the only job that can build/lint the swizzle itself.
      - run: cargo build  -p glass-clip-shim-macos --all-targets --locked
      - run: cargo clippy -p glass-clip-shim-macos --all-targets --locked -- -D warnings
      # Compile/link gate for the harness=false `a11y` on-box integration test
      # (crates/glass-macos/tests/a11y.rs) and its Swift fixture — proves both build against
      # this runner's SDK without attempting the granted run (needs the Accessibility/Screen
      # Recording TCC grants and a WindowServer session the runner doesn't have; that
      # happens out-of-band — see the script's own comments and docs/running-on-macos.md).
      - run: ./scripts/test-macos-a11y.sh
      # glass-mcp is the shipped binary; only this job can build/lint/test/run its
      # cfg(target_os = "macos") wiring (Cargo.toml's macos dep, lib.rs's "macos" backend
      # arm + default_backend). `cargo test` here is what actually executes the grants-free
      # unit tests behind #[cfg(target_os = "macos")] (e.g. doctor's session-state /
      # backend-resolution tests) — Linux/Windows compile that code out entirely, so this is
      # the only job that runs it. Capture/input tools still need a granted,
      # WindowServer-connected session the runner doesn't have, so those stay at
      # build/lint/headless-boot — the granted checks run on-box (see
      # docs/running-on-macos.md).
      - run: cargo build  -p glass-mcp --locked
      - run: cargo clippy -p glass-mcp --all-targets --locked -- -D warnings
      - run: cargo test   -p glass-mcp --locked
      - name: glass-mcp doctor sees the macos backend (TCC grants are absent on the runner)
        # `doctor` exits non-zero without the Screen Recording/Accessibility grants, which
        # the runner never has — expected, and NOT gated here (a hard exit-code gate would
        # permanently red this job). What IS gated: the default backend must still resolve
        # to "macos", proving the glass-macos wiring actually links and runs.
        run: |
          out="$(cargo run -p glass-mcp --locked -- doctor || true)"
          echo "$out"
          echo "$out" | grep -q "default backend: macos" || {
            echo "::error::glass-mcp doctor did not resolve the default backend to macos"
            exit 1
          }
      - name: glass-mcp headless stdio smoke (initialize + tools/list; no grants needed)
        run: ./scripts/test-macos-mcp.sh

  windows:
    name: Windows (build · clippy · test)
    runs-on: windows-latest
    # The Cargo workspace is at the repo root.
    steps:
      - uses: actions/checkout@v6
      # rustup auto-installs the pinned toolchain from rust-toolchain.toml for the
      # x86_64-pc-windows-msvc host (MSVC linker ships on the runner).
      - name: Install pinned toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
      # --workspace can't be used: glass-wayland/glass-testapp are Unix-only. Scope to
      # the Windows crate closure with an explicit -p list (a future Unix-only crate
      # won't get silently pulled, unlike --exclude). --all-targets compiles the
      # glass-windows examples natively.
      - run: cargo build  -p glass-core -p glass-windows -p glass-a11y-windows -p glass-mcp --all-targets --locked
      - run: cargo clippy -p glass-core -p glass-windows -p glass-a11y-windows -p glass-mcp --all-targets --locked -- -D warnings
      - run: cargo test   -p glass-core -p glass-windows -p glass-a11y-windows -p glass-mcp --locked

  coverage:
    name: coverage (report-only)
    runs-on: ubuntu-latest
    # Non-gating: a coverage report, never a merge blocker. The number undercounts
    # by design (see scripts/coverage.sh): glass-windows Win32 FFI is
    # cfg(windows) so it isn't measured here, and the Wayland suite needs sway >=1.12
    # (not packaged on the runner) so it self-skips. Unit + X11 are measured.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - name: Install pinned toolchain
        run: rustup show
      - name: Add llvm-tools (required by cargo-llvm-cov)
        run: rustup component add llvm-tools-preview
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
      - name: Install system deps
        # xvfb + bubblewrap so the X11 integration suite (incl. sandbox_*) runs under coverage.
        # Ubuntu 24.04 runners restrict unprivileged user namespaces via AppArmor; re-enable
        # them for bubblewrap (no-op on images without the knob).
        run: |
          sudo apt-get update && sudo apt-get install -y xvfb bubblewrap
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true
      - name: Measure coverage (unit + X11; Wayland/AT-SPI self-skip)
        run: ./scripts/coverage.sh --lcov
      - uses: actions/upload-artifact@v7
        with:
          name: coverage-lcov
          path: target/llvm-cov/glass.lcov
          if-no-files-found: warn
